<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover">
    <title>Amjad Ultimate Wallet v8</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #f8fafc; --card: #ffffff; --text: #0f172a; --muted: #64748b;
            --primary: #059669; --danger: #e11d48; --debt: #4f46e5; --border: #e2e8f0;
            --radius: 24px; --shadow: 0 10px 30px rgba(0,0,0,0.05);
        }
        [data-theme="dark"] { --bg: #020617; --card: #0f172a; --text: #f1f5f9; --border: #1e293b; }
        * { box-sizing: border-box; font-family: 'Tajawal', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; background: var(--bg); color: var(--text); transition: 0.3s; padding-bottom: 110px; }
        
        /* شاشة القفل */
        #lock-screen { position: fixed; inset: 0; background: var(--bg); z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
        .pin-input { width: 220px; padding: 15px; border-radius: 15px; border: 2px solid var(--border); text-align: center; font-size: 24px; letter-spacing: 8px; margin-bottom: 20px; outline: none; background: var(--card); color: var(--text); }

        .container { max-width: 480px; margin: 0 auto; padding: 15px; display: none; }
        .main-card { background: linear-gradient(135deg, #059669 0%, #10b981 100%); color: white; padding: 25px; border-radius: var(--radius); box-shadow: 0 20px 40px rgba(5,150,105,0.2); margin-bottom: 20px; position: relative; }
        .card { background: var(--card); border-radius: 18px; padding: 18px; box-shadow: var(--shadow); border: 1px solid var(--border); margin-bottom: 12px; }
        
        .btn { border: none; border-radius: 15px; padding: 12px; font-weight: 700; cursor: pointer; width: 100%; display: flex; align-items: center; justify-content: center; gap: 8px; transition: 0.2s; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-outline { background: var(--card); border: 1px solid var(--border); color: var(--text); }
        
        input, select { width: 100%; padding: 12px; border: 2px solid var(--border); border-radius: 12px; background: var(--bg); color: var(--text); margin-bottom: 10px; outline: none; }
        .progress-bar { height: 8px; background: var(--bg); border-radius: 10px; margin: 10px 0; overflow: hidden; }
        .progress-fill { height: 100%; transition: 0.5s; }

        .nav-hub { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); width: 92%; max-width: 420px; background: rgba(var(--card), 0.9); backdrop-filter: blur(15px); border-radius: 25px; display: flex; justify-content: space-around; padding: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); border: 1px solid var(--border); z-index: 1000; }
        .nav-link { color: var(--muted); text-decoration: none; display: flex; flex-direction: column; align-items: center; font-size: 11px; font-weight: 700; }
        .nav-link.active { color: var(--primary); }
        
        .tx-item { display: flex; align-items: center; justify-content: space-between; padding: 12px; background: var(--card); border-radius: 15px; margin-bottom: 8px; border: 1px solid var(--border); }
        .ghost-blur { filter: blur(8px); transition: 0.3s; }
        .no-ghost .ghost-blur { filter: blur(0); }
    </style>
</head>
<body class="no-ghost">

<div id="lock-screen">
    <div style="font-size: 50px; margin-bottom: 10px;">🛡️</div>
    <h2 style="color:var(--primary); margin-top:0;">AMJAD SECURE</h2>
    <input type="password" id="pin-field" class="pin-input" inputmode="numeric" maxlength="4" placeholder="••••">
    <button class="btn btn-primary" onclick="unlock()" style="width:220px">فتح المحفظة</button>
</div>

<div class="container" id="main-app">
    <div style="display:flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
        <b style="font-size: 18px;">نظام أمجد المالي 💎</b>
        <div style="display:flex; gap:8px;">
            <button class="btn btn-outline" style="padding:8px;" onclick="toggleGhost()">👁️</button>
            <button class="btn btn-outline" style="padding:8px;" onclick="toggleTheme()">🌙</button>
        </div>
    </div>

    <div class="main-card">
        <div style="display:flex; justify-content: space-between; align-items: center; opacity: 0.9; font-size: 12px;">
            <span>الرصيد المتاح</span>
            <span onclick="editBalance()" style="cursor:pointer; background:rgba(255,255,255,0.2); padding:3px 10px; border-radius:8px;">✏️ تعديل</span>
        </div>
        <h1 id="total-val" class="ghost-blur" style="font-size: 35px; margin: 10px 0;">0.00 SAR</h1>
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
            <div style="background:rgba(255,255,255,0.15); padding:8px; border-radius:12px; text-align:center;">
                <small style="font-size:10px;">مصاريف اليوم</small>
                <div id="today-spent" class="ghost-blur" style="font-weight:900;">0</div>
            </div>
            <div style="background:rgba(255,255,255,0.15); padding:8px; border-radius:12px; text-align:center;">
                <small style="font-size:10px;">الديون</small>
                <div id="debt-val" class="ghost-blur" style="font-weight:900;">0</div>
            </div>
        </div>
    </div>

    <div id="p-home" class="page">
        <div class="card">
            <b>إضافة مصروف 📝</b><br><br>
            <input id="in-n" placeholder="اسم المصروف">
            <div style="display:flex; gap:8px;">
                <input id="in-a" type="number" placeholder="المبلغ">
                <select id="in-c">
                    <option value="🍔">طعام</option><option value="🚗">مواصلات</option><option value="🛍️">تسوق</option><option value="⚡">فواتير</option>
                </select>
            </div>
            <button class="btn btn-primary" onclick="add()">حفظ العملية ✨</button>
        </div>
        <div id="list-history"></div>
    </div>

    <div id="p-analytics" class="page" style="display:none;">
        <div class="card">
            <b style="display:block; text-align:center; margin-bottom:15px;">📊 توزيع المصاريف</b>
            <canvas id="myChart" style="max-height: 250px;"></canvas>
        </div>
    </div>

    <div id="p-debt" class="page" style="display:none;">
        <div class="card">
            <b>مديونية جديدة 💸</b><br><br>
            <input id="db-p" placeholder="اسم الدائن">
            <input id="db-t" type="number" placeholder="المبلغ">
            <button class="btn btn-primary" style="background:var(--debt)" onclick="addDebt()">حفظ الدين</button>
        </div>
        <div id="list-debt"></div>
    </div>

    <div id="p-settings" class="page" style="display:none;">
        <div class="card">
            <b>قفل التطبيق 🔒</b><br><br>
            <input id="new-pin" type="password" maxlength="4" placeholder="تغيير رمز PIN">
            <button class="btn btn-outline" onclick="changePin()">تحديث الرمز</button>
        </div>
        <div class="card">
            <b>التقارير 📑</b><br><br>
            <button class="btn btn-outline" onclick="window.print()">طباعة تقرير PDF</button>
        </div>
    </div>
</div>

<nav class="nav-hub" id="nav-bar" style="display:none;">
    <a href="javascript:void(0)" class="nav-link active" onclick="nav('home', this)">🏠<span>الرئيسية</span></a>
    <a href="javascript:void(0)" class="nav-link" onclick="nav('analytics', this)">📊<span>التحليل</span></a>
    <a href="javascript:void(0)" class="nav-link" onclick="nav('debt', this)">💸<span>الديون</span></a>
    <a href="javascript:void(0)" class="nav-link" onclick="nav('settings', this)">⚙️<span>إعدادات</span></a>
</nav>

<script>
    let db = JSON.parse(localStorage.getItem('amjad_master_v8')) || { pin: '1234', balance: 5000, entries: [], debts: [] };
    let myChart = null;

    function unlock() {
        if (document.getElementById('pin-field').value === db.pin) {
            document.getElementById('lock-screen').style.display = 'none';
            document.getElementById('main-app').style.display = 'block';
            document.getElementById('nav-bar').style.display = 'flex';
            render();
        } else { alert("الرمز خاطئ!"); }
    }

    function editBalance() {
        const v = prompt("أدخل الرصيد الجديد:", db.balance);
        if(v) { db.balance = parseFloat(v); save(); }
    }

    function add() {
        const n = document.getElementById('in-n').value, a = parseFloat(document.getElementById('in-a').value);
        if(!n || !a) return;
        db.entries.push({ id: Date.now(), n, a, c: document.getElementById('in-c').value, d: new Date().toLocaleDateString('ar-SA') });
        document.getElementById('in-n').value = ''; document.getElementById('in-a').value = '';
        save();
    }

    function addDebt() {
        const p = document.getElementById('db-p').value, t = parseFloat(document.getElementById('db-t').value);
        if(!p || !t) return;
        db.debts.push({ id: Date.now(), p, t, paid: 0 });
        document.getElementById('db-p').value = ''; document.getElementById('db-t').value = '';
        save();
    }

    function settle(id) {
        const val = prompt("المبلغ المدفوع:");
        if(!val) return;
        const d = db.debts.find(i => i.id === id);
        d.paid += parseFloat(val);
        if(d.paid >= d.t) db.debts = db.debts.filter(i => i.id !== id);
        save();
    }

    function render() {
        const today = new Date().toLocaleDateString('ar-SA');
        const tExp = db.entries.reduce((s, i) => s + i.a, 0);
        const tToday = db.entries.filter(i => i.d === today).reduce((s, i) => s + i.a, 0);
        
        document.getElementById('total-val').innerText = (db.balance - tExp).toFixed(2) + " SAR";
        document.getElementById('today-spent').innerText = tToday.toFixed(2);

        document.getElementById('list-history').innerHTML = db.entries.slice().reverse().map(i => `
            <div class="tx-item">
                <span>${i.c} ${i.n}<br><small class="muted">${i.d}</small></span>
                <b class="ghost-blur" style="color:var(--danger)">-${i.a}</b>
            </div>
        `).join('');

        let dTot = 0;
        document.getElementById('list-debt').innerHTML = db.debts.map(i => {
            const rem = i.t - i.paid; dTot += rem;
            return `<div class="card">
                <div style="display:flex; justify-content:space-between"><b>👤 ${i.p}</b><b class="ghost-blur">${rem}</b></div>
                <div class="progress-bar"><div class="progress-fill" style="width:${(i.paid/i.t)*100}%; background:var(--debt)"></div></div>
                <button class="btn btn-outline" style="padding:5px" onclick="settle(${i.id})">تسديد جزء</button>
            </div>`;
        }).join('');
        document.getElementById('debt-val').innerText = dTot.toFixed(2);
        if(window.getComputedStyle(document.getElementById('p-analytics')).display !== 'none') updateChart();
    }

    function updateChart() {
        const cats = { "طعام":0, "مواصلات":0, "تسوق":0, "فواتير":0 };
        const map = { "🍔":"طعام", "🚗":"مواصلات", "🛍️":"تسوق", "⚡":"فواتير" };
        db.entries.forEach(e => { if(map[e.c]) cats[map[e.c]] += e.a; });
        const ctx = document.getElementById('myChart').getContext('2d');
        if(myChart) myChart.destroy();
        myChart = new Chart(ctx, {
            type: 'doughnut',
            data: { labels: Object.keys(cats), datasets: [{ data: Object.values(cats), backgroundColor: ['#10b981', '#f59e0b', '#3b82f6', '#ef4444'] }] },
            options: { plugins: { legend: { position: 'bottom' } } }
        });
    }

    function save() { localStorage.setItem('amjad_master_v8', JSON.stringify(db)); render(); }
    function nav(p, el) {
        document.querySelectorAll('.page').forEach(pg => pg.style.display = 'none');
        document.getElementById('p-'+p).style.display = 'block';
        document.querySelectorAll('.nav-link').forEach(n => n.classList.remove('active'));
        el.classList.add('active');
        if(p === 'analytics') updateChart();
    }
    function toggleTheme() { document.body.setAttribute('data-theme', document.body.getAttribute('data-theme') === 'dark' ? '' : 'dark'); }
    function toggleGhost() { document.body.classList.toggle('no-ghost'); }
    function changePin() { const p = document.getElementById('new-pin').value; if(p.length === 4) { db.pin = p; save(); alert("تم التغيير!"); } }

    window.onload = () => { if(db.pin === '1234') alert("تنبيه: الرمز الافتراضي هو 1234، يرجى تغييره من الإعدادات."); };
</script>
</body>
</html>
